<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelBuddy – Sequence Diagram</title>
  <style>
    body {
      background: #ffffff;
      color: #000000;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
    }

    h1 {
      color: #000000;
      margin-bottom: 20px;
    }

    svg {
      width: 100%;
      max-width: 900px;
    }

    .object {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 1.5;
    }

    .lifeline {
      stroke: #000000;
      stroke-width: 1;
      stroke-dasharray: 6 4;
    }

    .message {
      stroke: #000000;
      stroke-width: 1.2;
      marker-end: url(#arrow);
    }

    .return {
      stroke: #000000;
      stroke-width: 1;
      stroke-dasharray: 4 3;
      marker-end: url(#arrow);
    }

    text {
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>Add Expense – Sequence Diagram</h1>

  <svg viewBox="0 0 900 600">

    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="#000000" />
      </marker>
    </defs>

    <!-- Objects -->
    <rect x="80" y="20" width="100" height="40" class="object" />
    <text x="130" y="45" text-anchor="middle">Student</text>

    <rect x="250" y="20" width="100" height="40" class="object" />
    <text x="300" y="45" text-anchor="middle">UI</text>

    <rect x="420" y="20" width="140" height="40" class="object" />
    <text x="490" y="45" text-anchor="middle">ExpenseManager</text>

    <rect x="640" y="20" width="140" height="40" class="object" />
    <text x="710" y="45" text-anchor="middle">StorageManager</text>

    <!-- Lifelines -->
    <line x1="130" y1="60" x2="130" y2="550" class="lifeline" />
    <line x1="300" y1="60" x2="300" y2="550" class="lifeline" />
    <line x1="490" y1="60" x2="490" y2="550" class="lifeline" />
    <line x1="710" y1="60" x2="710" y2="550" class="lifeline" />

    <!-- Messages -->
    <line x1="130" y1="100" x2="300" y2="100" class="message" />
    <text x="200" y="90">Enter expense details</text>

    <line x1="300" y1="150" x2="490" y2="150" class="message" />
    <text x="380" y="140">addExpense(data)</text>

    <line x1="490" y1="200" x2="710" y2="200" class="message" />
    <text x="600" y="190">save(expense)</text>

    <line x1="710" y1="250" x2="490" y2="250" class="return" />
    <text x="600" y="240">success</text>

    <line x1="490" y1="300" x2="300" y2="300" class="return" />
    <text x="380" y="290">Expense created</text>

    <line x1="300" y1="350" x2="130" y2="350" class="return" />
    <text x="200" y="340">Confirmation</text>

  </svg>

</body>

</html>
