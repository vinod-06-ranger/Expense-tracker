<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelBuddy – Black & White UML</title>
    <style>
        body {
            background: #ffffff;
            font-family: Arial, sans-serif;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        h1 {
            margin: 30px 0 10px;
        }

        svg {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 50px;
        }

        .box,
        ellipse {
            fill: none;
            stroke: #000;
            stroke-width: 1.5;
        }

        .line {
            stroke: #000;
            stroke-width: 1.2;
        }

        .dashed {
            stroke-dasharray: 5 3;
        }

        text {
            font-size: 12px;
            fill: #000;
        }
    </style>
</head>

<body>

    <h1>Use Case Diagram</h1>
    <svg viewBox="0 0 900 600">

        <!-- Actor -->
        <circle cx="80" cy="250" r="15" class="box" />
        <line x1="80" y1="265" x2="80" y2="310" class="line" />
        <line x1="60" y1="280" x2="100" y2="280" class="line" />
        <line x1="80" y1="310" x2="60" y2="340" class="line" />
        <line x1="80" y1="310" x2="100" y2="340" class="line" />
        <text x="80" y="360" text-anchor="middle">Student</text>

        <!-- System -->
        <rect x="150" y="50" width="700" height="500" class="box" />
        <text x="500" y="40" text-anchor="middle">HostelBuddy System</text>

        <!-- Use cases -->
        <ellipse cx="350" cy="120" rx="120" ry="25" />
        <text x="350" y="125" text-anchor="middle">Add Expense</text>

        <ellipse cx="350" cy="200" rx="120" ry="25" />
        <text x="350" y="205" text-anchor="middle">View Expenses</text>

        <ellipse cx="350" cy="280" rx="120" ry="25" />
        <text x="350" y="285" text-anchor="middle">Edit/Delete Expense</text>

        <ellipse cx="350" cy="360" rx="120" ry="25" />
        <text x="350" y="365" text-anchor="middle">Set Budget</text>

        <ellipse cx="600" cy="150" rx="120" ry="25" />
        <text x="600" y="155" text-anchor="middle">Manage Debt</text>

        <ellipse cx="600" cy="250" rx="120" ry="25" />
        <text x="600" y="255" text-anchor="middle">View Debt</text>

        <ellipse cx="600" cy="350" rx="120" ry="25" />
        <text x="600" y="355" text-anchor="middle">Chat with AI</text>

        <!-- Lines -->
        <line x1="100" y1="270" x2="230" y2="120" class="line" />
        <line x1="100" y1="275" x2="230" y2="200" class="line" />
        <line x1="100" y1="280" x2="230" y2="280" class="line" />
        <line x1="100" y1="285" x2="230" y2="360" class="line" />
        <line x1="100" y1="290" x2="480" y2="150" class="line" />
        <line x1="100" y1="295" x2="480" y2="250" class="line" />
        <line x1="100" y1="300" x2="480" y2="350" class="line" />

    </svg>

    <h1>Class Diagram</h1>
    <svg viewBox="0 0 1000 600">

        <!-- User -->
        <rect x="50" y="80" width="180" height="120" class="box" />
        <text x="140" y="100" text-anchor="middle">User</text>
        <line x1="50" y1="110" x2="230" y2="110" class="line" />
        <text x="60" y="130">userId</text>
        <text x="60" y="150">name</text>
        <text x="60" y="170">budget</text>

        <!-- Expense -->
        <rect x="350" y="60" width="180" height="140" class="box" />
        <text x="440" y="80" text-anchor="middle">Expense</text>
        <line x1="350" y1="90" x2="530" y2="90" class="line" />
        <text x="360" y="110">amount</text>
        <text x="360" y="130">category</text>
        <text x="360" y="150">date</text>

        <!-- Debt -->
        <rect x="700" y="60" width="180" height="140" class="box" />
        <text x="790" y="80" text-anchor="middle">Debt</text>
        <line x1="700" y1="90" x2="880" y2="90" class="line" />
        <text x="710" y="110">person</text>
        <text x="710" y="130">amount</text>

        <!-- Manager -->
        <rect x="350" y="300" width="200" height="100" class="box" />
        <text x="450" y="320" text-anchor="middle">ExpenseManager</text>
        <line x1="350" y1="330" x2="550" y2="330" class="line" />
        <text x="360" y="350">addExpense()</text>
        <text x="360" y="370">getAll()</text>

        <!-- AI -->
        <rect x="700" y="300" width="180" height="100" class="box" />
        <text x="790" y="320" text-anchor="middle">BuddyBot</text>
        <line x1="700" y1="330" x2="880" y2="330" class="line" />
        <text x="710" y="350">sendMessage()</text>

        <!-- Relations -->
        <line x1="230" y1="120" x2="350" y2="100" class="line" />
        <line x1="230" y1="140" x2="700" y2="100" class="line" />
        <line x1="440" y1="200" x2="450" y2="300" class="line" />
        <line x1="790" y1="200" x2="790" y2="300" class="line" />

    </svg>

</body>

</html>
